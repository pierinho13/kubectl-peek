# External Secrets Operator rules
#
# Supports common ExternalSecret API versions.
# Review the installed CRDs in your cluster before using these rules.

rules:
  - apiVersions:
      - external-secrets.io/v1
      - external-secrets.io/v1beta1
    kind: ExternalSecret
    resource: externalsecrets
    references:
      - path: spec.target.name
        relation: produces
        description: generated Secret

  - apiVersions:
      - external-secrets.io/v1
      - external-secrets.io/v1beta1
    kind: ClusterExternalSecret
    resource: clusterexternalsecrets
    references:
      - path: spec.externalSecretSpec.target.name
        relation: produces
        description: generated Secret
